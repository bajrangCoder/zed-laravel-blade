name = "Blade"
grammar = "blade"
path_suffixes = ["blade.php"]
block_comment = ["{{-- ", " --}}"]
autoclose_before = ";:.,=}])>"
word_characters = ["-"]
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = [
        "string",
    ] },
    { start = "'", end = "'", close = true, newline = false, not_in = [
        "string",
    ] },
    { start = "<", end = ">", close = false, newline = true, not_in = [
        "string",
        "comment",
    ] },
]
wrap_characters = { start_prefix = "<", start_suffix = ">", end_prefix = "</", end_suffix = ">" }
scope_opt_in_language_servers = ["tailwindcss-language-server"]
prettier_plugins = ["@shufo/prettier-plugin-blade"]
prettier_parser_name = "blade"

[jsx_tag_auto_close]
open_tag_node_name = "start_tag"
close_tag_node_name = "end_tag"
jsx_element_node_name = "element"
tag_name_node_name = "tag_name"
erroneous_close_tag_node_name = "erroneous_end_tag"
erroneous_close_tag_name_node_name = "erroneous_end_tag_name"

[overrides.element]
word_characters = ["-"]

[overrides.string]
word_characters = ["-"]
completion_query_characters = ["-"]
opt_into_language_servers = ["tailwindcss-language-server"]
